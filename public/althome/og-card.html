<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<title>og card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@600;800&family=Schibsted+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden;background:#000}
  .card{position:relative;width:1200px;height:630px;color:#fff;font-family:'Schibsted Grotesk',system-ui,sans-serif}
  .card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 42%;filter:grayscale(1) contrast(0.95) brightness(0.88)}
  .scrim{position:absolute;inset:0;background:radial-gradient(58% 50% at 50% 54%, rgba(6,6,6,.7), transparent 72%), linear-gradient(180deg,rgba(6,6,6,.66) 0%,transparent 28%,transparent 60%,rgba(6,6,6,.92) 100%)}
  .ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:30px 40px}
  .top{display:flex;justify-content:space-between;align-items:flex-start}
  .wm{font-family:'Lexend';font-weight:800;text-transform:uppercase;letter-spacing:-0.02em;font-size:22px}
  .meta{text-align:right;color:#d4d4d4;text-transform:uppercase;letter-spacing:.18em;font-weight:600;font-size:12px;line-height:1.5}
  .mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px}
  .mid h1{font-family:'Lexend';font-weight:800;text-transform:uppercase;letter-spacing:-0.04em;line-height:.82;font-size:128px;text-shadow:0 2px 30px rgba(0,0,0,.65),0 0 8px rgba(0,0,0,.5)}
  .mid p{text-transform:uppercase;letter-spacing:.16em;font-weight:600;font-size:18px;color:#f2f2f2;text-shadow:0 1px 14px rgba(0,0,0,.7)}
  .bottom{display:flex;justify-content:space-between;align-items:flex-end;text-transform:uppercase;letter-spacing:.14em;font-weight:600;font-size:13px}
  .pill{display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.7)}
  .btn{border:1px solid #fff;padding:11px 17px}
</style></head>
<body>
  <div class="card">
    <img src="gen/hero-v2-1.jpg" alt="">
    <div class="scrim"></div>
    <div class="ov">
      <div class="top">
        <span class="wm">Third Wave</span>
        <div class="meta"><div>Shared-Screen Multiplayer</div><div>Est. 2024 · Culver City</div></div>
      </div>
      <div class="mid">
        <h1>Third<br>Wave</h1>
        <p>Making places playable</p>
      </div>
      <div class="bottom">
        <span class="pill"><span class="dot"></span>Signups Open</span>
        <span class="btn">Get Invited</span>
      </div>
    </div>
  </div>
</body></html>
